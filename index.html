function App(){
const[tab,setTab]=useState(0);
const[pme,setPme]=useState(INIT_PME);
const[pea,setPea]=useState(INIT_PEA);
const[eid,setEid]=useState(null);
const[ev,setEv]=useState({});
const[dk,setDk]=useState(false);
const[af,setAf]=useState(null);
const[np,setNp]=useState({name:"",ticker:"",cours:"",pru:"",qty:"",sector:"Autre",consensus:"N/A",target:""});
const[gs,setGs]=useState(null);
const[cd,setCd]=useState(null);

const all=useMemo(()=>[...pme,...pea],[pme,pea]);
const stk=useMemo(()=>all.filter(p=>p.consensus!=="ETF"),[all]);
const nid=useMemo(()=>Math.max(0,...all.map(p=>p.id))+1,[all]);
const tv=useMemo(()=>all.reduce((s,p)=>s+p.cours*p.qty,0),[all]);
const tc=useMemo(()=>all.reduce((s,p)=>s+p.pru*p.qty,0),[all]);
const tpnl=tv-tc;const tpct=tc?(tpnl/tc)*100:0;
const pv=useMemo(()=>pea.reduce((s,p)=>s+p.cours*p.qty,0),[pea]);
const pmv=useMemo(()=>pme.reduce((s,p)=>s+p.cours*p.qty,0),[pme]);
const pc=useMemo(()=>pea.reduce((s,p)=>s+p.pru*p.qty,0),[pea]);
const pmc=useMemo(()=>pme.reduce((s,p)=>s+p.pru*p.qty,0),[pme]);
const sa=useMemo(()=>{const m={};all.forEach(p=>{m[p.sector]=(m[p.sector]||0)+p.cours*p.qty});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([n,v])=>({n,v,p:(v/tv)*100}))},[all,tv]);

const se=(p)=>{setEid(p.id);setEv({pru:p.pru,qty:p.qty,cours:p.cours})};
const sv=(id)=>{const u=l=>l.map(p=>p.id===id?{...p,pru:parseFloat(ev.pru)||p.pru,qty:parseInt(ev.qty)||p.qty,cours:parseFloat(ev.cours)||p.cours}:p);setPme(u);setPea(u);setEid(null)};
const ap=(t)=>{const p={id:nid,name:np.name.toUpperCase(),ticker:np.ticker.toUpperCase(),cours:parseFloat(np.cours)||0,pru:parseFloat(np.pru)||0,qty:parseInt(np.qty)||0,sector:np.sector,consensus:np.consensus,target:np.target?parseFloat(np.target):null,ac:0};if(!p.name||!p.cours||!p.qty)return;if(t==="pme")setPme(x=>[...x,p]);else setPea(x=>[...x,p]);setNp({name:"",ticker:"",cours:"",pru:"",qty:"",sector:"Autre",consensus:"N/A",target:""});setAf(null)};
const dp=(id)=>{setPme(x=>x.filter(p=>p.id!==id));setPea(x=>x.filter(p=>p.id!==id));setCd(null)};

const bg=dk?"#0a0a0f":"#f8f9fb",cr=dk?"#16172a":"#fff",tx=dk?"#e8e8f0":"#1a1a2e",ts=dk?"#8888a8":"#6b7280",bd=dk?"#2a2b45":"#e5e7eb",ac="#2563eb",gn="#10b981",rd="#ef4444";
const cs={background:cr,borderRadius:16,padding:20,border:`1px solid ${bd}`,marginBottom:12};
const ip={width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${bd}`,background:bg,color:tx,fontSize:13,outline:"none",boxSizing:"border-box"};

const Bar=({p,c})=><div style={{width:"100%",height:6,background:bd,borderRadius:3,overflow:"hidden"}}><div style={{width:`${Math.min(Math.abs(p),100)}%`,height:"100%",background:c,borderRadius:3}}/></div>;
const Pnl=({v})=><span style={{color:v>=0?gn:rd,fontWeight:700,fontSize:13}}>{v>=0?"▲":"▼"} {f(Math.abs(v))}</span>;
const CB=({c})=>{const m={"Achat Fort":{b:"#059669",f:"#fff"},Achat:{b:gn,f:"#fff"},Neutre:{b:"#f59e0b",f:"#000"},Conservation:{b:"#6b7280",f:"#fff"},Vente:{b:rd,f:"#fff"},"N/A":{b:bd,f:ts},ETF:{b:ac,f:"#fff"}}[c]||{b:bd,f:ts};return<span style={{background:m.b,color:m.f,padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600}}>{c}</span>};

const AF=({t})=><div style={{...cs,borderLeft:`4px solid ${gn}`}}>
<div style={{fontSize:14,fontWeight:700,color:tx,marginBottom:12}}>Ajouter — {t==="pme"?"PEA-PME":"PEA"}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
<div><div style={{fontSize:10,color:ts,marginBottom:2}}>Nom *</div><input value={np.name} onChange={e=>setNp({...np,name:e.target.value})} placeholder="LVMH" style={ip}/></div>
<div><div style={{fontSize:10,color:ts,marginBottom:2}}>Ticker</div><input value={np.ticker} onChange={e=>setNp({...np,ticker:e.target.value})} placeholder="MC" style={ip}/></div>

<div><div style={{fontSize:10,color:ts,marginBottom:2}}>Secteur</div><select value={np.sector} onChange={e=>setNp({...np,sector:e.target.value})} style={{...ip,appearance:"auto"}}>{SECS.map(s=><option key={s}>{s}</option>)}</select></div>
<div><div style={{fontSize:10,color:ts,marginBottom:2}}>Consensus</div><select value={np.consensus} onChange={e=>setNp({...np,consensus:e.target.value})} style={{...ip,appearance:"auto"}}>{CONS.map(c=><option key={c}>{c}</option>)}</select></div>
<div><div style={{fontSize:10,color:ts,marginBottom:2}}>Obj 12M (€)</div><input type="number" step="0.01" value={np.target} onChange={e=>setNp({...np,target:e.target.value})} style={ip}/></div>
</div>
<div style={{display:"flex",gap:8,marginTop:12}}>
<button onClick={()=>ap(t)} style={{padding:"8px 18px",borderRadius:10,background:ac,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>Ajouter</button>
<button onClick={()=>setAf(null)} style={{padding:"8px 18px",borderRadius:10,background:"transparent",color:ts,border:`1px solid ${bd}`,fontSize:13,cursor:"pointer"}}>Annuler</button>
</div></div>;

const PR=({p})=>{const pnl=(p.cours-p.pru)*p.qty;const pp=p.pru?((p.cours-p.pru)/p.pru)*100:0;const ie=eid===p.id;
return<div style={{...cs,padding:14}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
<div style={{flex:1}}>
<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:14,fontWeight:700,color:tx}}>{p.name}</span><CB c={p.consensus}/></div>
{ie?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:8}}>
{["cours","pru","qty"].map(k=><div key={k}><div style={{fontSize:10,color:ts,marginBottom:2}}>{k==="cours"?"Cours":k==="pru"?"PRU":"Qté"}</div><input value={ev[k]} onChange={e=>setEv({...ev,[k]:e.target.value})} style={{...ip,borderColor:ac}}/></div>)}
</div>:<div style={{fontSize:12,color:ts,marginTop:4}}>Cours: {f(p.cours)} · PRU: {f(p.pru)} · Qté: {p.qty}{p.target&&<span> · Obj: <span style={{color:ac,fontWeight:600}}>{f(p.target)}</span></span>}</div>}
</div>
<div style={{textAlign:"right",minWidth:90}}><div style={{fontSize:15,fontWeight:700,color:tx}}>{f(p.cours*p.qty)}</div><Pnl v={pnl}/><div style={{fontSize:11,color:pp>=0?gn:rd}}>{fp(pp)}</div></div>
</div>
<div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
{ie?<><button onClick={()=>sv(p.id)} style={{padding:"5px 14px",borderRadius:8,background:gn,color:"#fff",border:"none",fontSize:11,fontWeight:600,cursor:"pointer"}}>Sauvegarder</button><button onClick={()=>setEid(null)} style={{padding:"5px 14px",borderRadius:8,background:"transparent",color:ts,border:`1px solid ${bd}`,fontSize:11,cursor:"pointer"}}>Annuler</button></>:
<><button onClick={()=>se(p)} style={{padding:"5px 14px",borderRadius:8,background:"transparent",color:ac,border:`1px solid ${ac}`,fontSize:11,fontWeight:600,cursor:"pointer"}}>Modifier</button>
{cd===p.id?<><button onClick={()=>dp(p.id)} style={{padding:"5px 14px",borderRadius:8,background:rd,color:"#fff",border:"none",fontSize:11,fontWeight:600,cursor:"pointer"}}>Confirmer</button><button onClick={()=>setCd(null)} style={{padding:"5px 14px",borderRadius:8,background:"transparent",color:ts,border:`1px solid ${bd}`,fontSize:11,cursor:"pointer"}}>Non</button></>:
<button onClick={()=>setCd(p.id)} style={{padding:"5px 14px",borderRadius:8,background:"transparent",color:rd,border:`1px solid ${rd}`,fontSize:11,fontWeight:600,cursor:"pointer"}}>Supprimer</button>}</>}
</div></div>};

const T0=()=><div>
<div style={{...cs,background:`linear-gradient(135deg,${ac},#7c3aed)`,border:"none",color:"#fff"}}>
<div style={{fontSize:13,opacity:0.8}}>Valeur Totale</div>
<div style={{fontSize:36,fontWeight:800,letterSpacing:-1}}>{f(tv)}</div>
<div style={{display:"flex",gap:20,marginTop:12}}>
<div><span style={{opacity:0.7,fontSize:12}}>P&L</span><br/><span style={{fontSize:18,fontWeight:700}}>{tpnl>=0?"+":""}{f(tpnl)}</span></div>
<div><span style={{opacity:0.7,fontSize:12}}>Perf.</span><br/><span style={{fontSize:18,fontWeight:700}}>{fp(tpct)}</span></div>
</div></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
{[["PEA",pv,pc],["PEA-PME",pmv,pmc]].map(([l,v,c])=><div key={l} style={cs}><div style={{fontSize:11,color:ts,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{l}</div><div style={{fontSize:22,fontWeight:700,color:tx,marginTop:4}}>{f(v)}</div><div style={{fontSize:12,color:(v-c)>=0?gn:rd,fontWeight:600}}>{c?fp(((v-c)/c)*100):"—"}</div></div>)}
</div>
<div style={cs}><div style={{fontSize:14,fontWeight:700,color:tx,marginBottom:12}}>Top Performers</div>
{[...all].sort((a,b)=>(b.cours-b.pru)*b.qty-(a.cours-a.pru)*a.qty).slice(0,5).map(p=>{const pnl=(p.cours-p.pru)*p.qty;const pp=((p.cours-p.pru)/p.pru)*100;
return<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${bd}`}}>
<div><div style={{fontSize:13,fontWeight:600,color:tx}}>{p.name}</div><div style={{fontSize:11,color:ts}}>{f(p.cours*p.qty)}</div></div>
<div style={{textAlign:"right"}}><Pnl v={pnl}/><div style={{fontSize:11,color:pp>=0?gn:rd}}>{fp(pp)}</div></div></div>})}
</div>
<div style={cs}><div style={{fontSize:14,fontWeight:700,color:tx,marginBottom:12}}>Allocation Sectorielle</div>
{sa.slice(0,10).map(s=><div key={s.n} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:tx,marginBottom:3}}><span>{s.n}</span><span style={{color:ts}}>{s.p.toFixed(1)}%</span></div><Bar p={s.p} c={ac}/></div>)}
</div>
<div style={cs}><div style={{fontSize:14,fontWeight:700,color:tx,marginBottom:12}}>Consensus — Objectifs 12M</div>
